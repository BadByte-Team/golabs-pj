# deployments/nginx/nginx.conf
# Reverse proxy que conecta Internet → UI → API.
# La API no tiene puertos expuestos; solo nginx puede alcanzarla (via frontend-net).

events {
    worker_connections 1024;
}

http {
    # Cabeceras de seguridad globales
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"           always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "strict-origin"  always;

    # Ocultar la versión de nginx del header Server
    server_tokens off;

    # Límite de tamaño de body (misma política que la API interna)
    client_max_body_size 1m;

    # ── Servidor HTTP en puerto 80 ──────────────────────────────────────────────
    # En producción: redirigir todo a HTTPS y comentar el bloque de proxy.
    server {
        listen 80;
        server_name _;

        # Proxy de /api/* hacia la API interna (nombre de servicio Docker: 'api')
        location /api/ {
            proxy_pass         http://api:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts razonables
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # Proxy de /healthz/* hacia la API (para healthchecks del orquestador)
        location /healthz/ {
            proxy_pass http://api:8080;
        }

        # ── Placeholder: servir el frontend estático ─────────────────────────
        # Cuando tengas una SPA (React/Vue/etc.), montá el build aquí:
        #
        #   volumes:
        #     - ./frontend/dist:/usr/share/nginx/html:ro
        #
        # Y descomentá:
        # root /usr/share/nginx/html;
        # try_files $uri $uri/ /index.html;

        # Servir el frontend estático desde /usr/share/nginx/html
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── HTTPS (descommentar en producción) ─────────────────────────────────────
    # server {
    #     listen 443 ssl;
    #     server_name tu-dominio.com;
    #
