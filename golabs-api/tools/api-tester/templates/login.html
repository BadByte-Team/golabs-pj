<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>GoLabs — Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: #0d0f14;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at 20% 50%, #6366f118 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #a78bfa12 0%, transparent 60%);
        }

        .card {
            position: relative;
            z-index: 1;
            background: #141720;
            border: 1px solid #252a3d;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px #00000060;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo span {
            font-size: 2.5rem;
            display: block;
            margin-bottom: .5rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: .8rem;
            color: #64748b;
            margin-top: .25rem;
        }

        .tabs {
            display: flex;
            background: #0d0f14;
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 1.5rem;
            gap: 3px;
        }

        .tab-btn {
            flex: 1;
            padding: .5rem;
            border: none;
            background: none;
            color: #64748b;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            transition: all .15s;
        }

        .tab-btn.active {
            background: #1a1e2e;
            color: #a78bfa;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: .75rem;
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: .35rem;
        }

        input {
            width: 100%;
            background: #0d0f14;
            border: 1px solid #252a3d;
            border-radius: 8px;
            color: #e2e8f0;
            padding: .65rem .85rem;
            font-size: .875rem;
            font-family: inherit;
            transition: border-color .15s;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn {
            width: 100%;
            padding: .75rem;
            border: none;
            border-radius: 8px;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            transition: opacity .15s;
            margin-top: .5rem;
        }

        .btn:hover {
            opacity: .9;
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .alert {
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .8rem;
            margin-top: 1rem;
            display: none;
        }

        .alert.err {
            background: #ef444420;
            border: 1px solid #ef444440;
            color: #fca5a5;
        }

        .alert.ok {
            background: #22c55e20;
            border: 1px solid #22c55e40;
            color: #86efac;
        }

        .server-url {
            text-align: center;
            margin-top: 1.5rem;
            font-size: .72rem;
            color: #334155;
        }

        .server-url strong {
            color: #475569;
        }
    </style>
</head>

<body>
    <div class="bg"></div>
    <div class="card">
        <div class="logo">
            <span>🚩</span>
            <h1>GoLabs API Tester</h1>
            <p>Panel de pruebas de la API</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Iniciar sesión</button>
            <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
        </div>

        <!-- Login -->
        <div class="tab-panel active" id="tab-login">
            <div class="form-group">
                <label>Email o Username</label>
                <input type="text" id="l-email" placeholder="admin@golabs.io  ó  admin" autocomplete="username" />
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter')doLogin()" />
            </div>
            <button class="btn" id="l-btn" onclick="doLogin()">Entrar</button>
            <div class="alert" id="l-alert"></div>
        </div>

        <!-- Register -->
        <div class="tab-panel" id="tab-register">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="r-user" placeholder="hacker" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="r-email" placeholder="hacker@ctf.io" />
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="r-pass" placeholder="••••••••"
                    onkeydown="if(event.key==='Enter')doRegister()" />
            </div>
            <button class="btn" id="r-btn" onclick="doRegister()">Crear cuenta</button>
            <div class="alert" id="r-alert"></div>
        </div>

        <p class="server-url">Servidor: <strong>{{ base_url }}</strong></p>
    </div>

    <script>
        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === (t === 'login' ? 0 : 1)));
            document.querySelectorAll('.tab-panel').forEach((p, i) => p.classList.toggle('active', i === (t === 'login' ? 0 : 1)));
        }

        async function doLogin() {
            const btn = document.getElementById('l-btn');
            const alert = document.getElementById('l-alert');
            btn.disabled = true; btn.textContent = 'Entrando...';
            alert.style.display = 'none';
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        identifier: document.getElementById('l-email').value,
                        password: document.getElementById('l-pass').value
                    })
                });
                const json = await r.json();
                if (json.status === 200 && json.body?.access_token) {
                    alert.className = 'alert ok'; alert.textContent = '✓ Login exitoso — redirigiendo...';
                    alert.style.display = 'block';
                    setTimeout(() => window.location.href = '/', 700);
                } else {
                    const msg = (json.body?.error) || JSON.stringify(json.body) || 'Error desconocido';
                    alert.className = 'alert err'; alert.textContent = '✗ ' + msg; alert.style.display = 'block';
                }
            } catch (e) {
                alert.className = 'alert err'; alert.textContent = '✗ Error de conexión: ' + e.message; alert.style.display = 'block';
            }
            btn.disabled = false; btn.textContent = 'Entrar';
        }

        async function doRegister() {
            const btn = document.getElementById('r-btn');
            const al = document.getElementById('r-alert');
            btn.disabled = true; btn.textContent = 'Creando cuenta...'; al.style.display = 'none';
            try {
                const r = await fetch('/api/auth/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('r-user').value,
                        email: document.getElementById('r-email').value,
                        password: document.getElementById('r-pass').value
                    })
                });
                const json = await r.json();
                if (json.status === 201 || json.status === 200) {
                    al.className = 'alert ok'; al.textContent = '✓ Cuenta creada. Ahora inicia sesión.'; al.style.display = 'block';
                    switchTab('login');
                } else {
                    const msg = (json.body?.error) || JSON.stringify(json.body) || 'Error';
                    al.className = 'alert err'; al.textContent = '✗ ' + msg; al.style.display = 'block';
                }
            } catch (e) {
                al.className = 'alert err'; al.textContent = '✗ ' + e.message; al.style.display = 'block';
            }
            btn.disabled = false; btn.textContent = 'Crear cuenta';
        }
    </script>
</body>

</html>
